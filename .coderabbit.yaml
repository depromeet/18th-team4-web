language: "ko-KR"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!*.lock"

  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        한국어로 리뷰해주세요.
        우리 팀은 Next.js App Router + TypeScript + Tailwind CSS 기반 프로젝트입니다.

        아래 팀 컨벤션을 우선 기준으로 리뷰해주세요.

        1. 코드 스타일
        - 세미콜론을 사용해야 합니다.
        - single quote를 사용해야 합니다.
        - trailing comma를 사용해야 합니다.
        - printWidth 80 기준으로 너무 긴 코드는 분리를 제안해주세요.
        - Tailwind class는 prettier-plugin-tailwindcss 정렬 기준을 따릅니다.

        2. 네이밍 컨벤션
        - 컴포넌트 파일명은 PascalCase를 사용합니다.
        - 일반 함수와 변수는 camelCase를 사용합니다.
        - 상수는 UPPER_SNAKE_CASE를 사용합니다.
        - 이미지/에셋 파일명은 kebab-case를 사용합니다.
        - Boolean 변수는 is/has/should 접두사를 사용합니다.

        3. React / TypeScript
        - any 사용은 지양하고 정확한 타입 또는 unknown 사용을 제안해주세요.
        - 타입 전용 import는 import type 사용을 권장해주세요.
        - Props 타입은 컴포넌트 근처에 선언하고 ComponentNameProps 형태를 권장해주세요.
        - React.FC 사용은 지양하고 명시적인 props 타입을 사용하도록 제안해주세요.
        - default export는 페이지 컴포넌트 외에는 지양합니다.

        4. 상태 관리
        - 서버 상태는 TanStack Query를 사용하도록 권장해주세요.
        - API 응답 데이터를 Zustand에 저장하지 않도록 확인해주세요.
        - 클라이언트 전역 UI 상태만 Zustand에 저장하도록 제안해주세요.
        - useEffect를 통한 직접 데이터 패칭은 지양하고 TanStack Query 사용을 제안해주세요.

        5. 폴더 구조
        - src/app은 App Router 관련 파일에 사용합니다.
        - src/components는 전역 공용 UI에 사용합니다.
        - src/hooks는 전역 공용 훅에 사용합니다.
        - src/lib는 공용 utils/API 설정에 사용합니다.
        - src/constant는 PathName, END_POINTS, QueryKey 등 전역 상수에 사용합니다.
        - src/store는 Zustand 스토어에 사용합니다.
        - src/assets는 정적 에셋에 사용합니다.
        - src 내부 import는 @/ alias 사용을 권장하고, 과도한 ../ 상대경로는 지양합니다.

        6. 리뷰 톤
        - 반드시 수정해야 하는 문제와 개선 제안을 구분해주세요.
        - 사소한 취향 차이는 nitpick으로 표시해주세요.
        - 단순 지적보다 왜 문제인지와 어떻게 고치면 좋은지를 함께 설명해주세요.
        - 새 의존성 추가가 있다면 필요성과 대안을 확인해주세요.

    - path: ".github/**"
      instructions: |
        GitHub 관련 설정은 팀의 브랜치 전략과 PR 규칙에 맞는지 확인해주세요.
        브랜치 흐름은 main ← dev ← feature/* 를 기준으로 합니다.
        PR은 dev 대상이 기본이며, 최소 2명 approve 후 머지하는 규칙을 따릅니다.
