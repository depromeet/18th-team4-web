name: Deploy Storybook Preview

on:
  pull_request:
    types: [labeled]
    branches: [dev]

concurrency:
  group: storybook-gh-pages
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  HUSKY: 0
  # Storybook 빌드 시 next.config.ts 로드를 통과시키기 위한 placeholder.
  # Storybook은 Next의 API rewrite를 사용하지 않으므로 실제 프록시 대상 URL이 아니어도 무방.
  API_PROXY_TARGET: http://localhost

jobs:
  deploy-preview:
    if: >-
      ${{
        github.event.label.name == 'storybook preview' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Disable Jekyll
        run: touch storybook-static/.nojekyll

      - name: Deploy Storybook preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: storybook-static
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: true
          force: false
          attempt-limit: 5

      - name: Comment preview URL
        id: comment-preview-url
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${prNumber}/`;
            const marker = '<!-- storybook-preview-comment -->';
            const body = `${marker}\nStorybook Preview: ${previewUrl}`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });

              const previous = comments.find(
                (comment) =>
                  comment.user.type === 'Bot' &&
                  comment.body.includes(marker),
              );

              if (previous) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: previous.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            } catch (error) {
              core.warning(`Failed to write Storybook preview comment: ${error.message}`);
            }

      - name: Comment preview failure
        if: failure() && steps.comment-preview-url.outcome == 'skipped'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- storybook-preview-comment -->';
            const body = `${marker}\nStorybook Preview build failed: ${runUrl}`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });

              const previous = comments.find(
                (comment) =>
                  comment.user.type === 'Bot' &&
                  comment.body.includes(marker),
              );

              if (previous) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: previous.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            } catch (error) {
              core.warning(`Failed to write Storybook preview failure comment: ${error.message}`);
            }
